<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for lihini</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0e0e12;
    background-image: radial-gradient(#1a1a20 1px, transparent 1px);
    background-size: 20px 20px;
    font-family: 'Georgia', serif;
    color: #c4c4cc;
    overflow: hidden;
  }
  .page {
    background: #1a1a20;
    width: 90%;
    max-width: 400px;
    min-height: 460px;
    border-radius: 16px;
    padding: 48px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border: 1px solid #26262f;
    position: absolute;
    opacity: 0;
    transform: scale(0.98);
    transition: all 0.7s ease;
    pointer-events: none;
    display: flex;
    flex-direction: column;
  }
  .page.active {
    opacity: 1;
    transform: scale(1);
    pointer-events: all;
  }
  
  /* PAGE 1 */
  .page1 { text-align: center; justify-content: center; }
  .page1 .candle { font-size: 48px; margin-bottom: 24px; filter: drop-shadow(0 0 8px rgba(255, 214, 140, 0.4)); }
  .page1 h1 { 
    font-size: 24px; 
    font-weight: 400; 
    color: #e6c28c;
    letter-spacing: 0.5px; 
    margin-bottom: 10px; 
  }
  .page1 .date { 
    font-size: 14px; 
    color: #a0a0aa;
    margin-bottom: 36px; 
  }
  .btn {
    background: transparent;
    border: 1px solid #e6c28c;
    padding: 12px 32px;
    border-radius: 6px;
    color: #e6c28c;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Georgia', serif;
    letter-spacing: 0.5px;
    align-self: center;
  }
  .btn:hover { 
    background: #e6c28c; 
    color: #1a1a20; 
  }

  /* PAGE 2 + 3 */
  .page2, .page3 { text-align: left; justify-content: flex-start; }
  .page2 h2, .page3 h2 { 
    font-size: 22px; /* Loku kala */
    font-weight: 400; 
    color: #e6c28c; /* Gold kala */
    margin-bottom: 22px;
    text-align: center; /* Center kala */
    letter-spacing: 0.5px;
  }
  .typewriter {
    font-size: 14.5px;
    line-height: 1.95;
    color: #b0b0ba;
    white-space: pre-wrap;
    flex-grow: 1;
  }
  .cursor { border-right: 1px solid #b0b0ba; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { border-color: transparent; } }
  .nav {
    display: flex;
    justify-content: space-between;
    margin-top: 28px;
    font-size: 12px;
    color: #707078;
  }
  .nav button {
    background: none;
    border: none;
    color: #707078;
    cursor: pointer;
    text-decoration: underline;
    font-family: 'Georgia', serif;
  }
  .nav button:disabled { opacity: 0.3; cursor: default; text-decoration: none; }
  .signature {
    margin-top: 20px;
    text-align: right;
    font-style: italic;
    color: #707078;
    font-size: 13px;
    opacity: 0;
    transition: opacity 2s ease 3s;
  }
  .signature.show { opacity: 1; }
  .page3 .last-line {
    font-size: 15px;
    line-height: 1.8;
    color: #909098;
    margin-top: 40px; /* Udada space adu kala */
    text-align: center;
    opacity: 0;
    transition: opacity 2s ease 1s;
  }
  .page3 .last-line.show { opacity: 1; }
  audio { display: none; }
</style>
</head>
<body>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/24/audio_d1718f3fbc.mp3" type="audio/mpeg">
</audio>
<audio id="chime">
  <source src="https://cdn.pixabay.com/audio/2024/08/01/audio_9f6b2c2b1a.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1: COVER -->
<div class="page page1 active" id="page1">
  <div class="candle">🕯️</div>
  <h1>Happy Birthday, Lihini</h1>
  <div class="date">July 22, 2026</div>
  <button class="btn" onclick="startExperience()">Open</button>
</div>

<!-- PAGE 2: LETTER -->
<div class="page page2" id="page2">
  <h2>hey lihini,</h2>
  <div class="typewriter cursor" id="text"></div>
  <div class="signature" id="sig">— i am your ex boyfriend Dinu</div>
  <div class="nav">
    <button onclick="nextPage(1)">back</button>
    <button id="nextBtn2" onclick="nextPage(3)" disabled>next →</button>
  </div>
</div>

<!-- PAGE 3: END - HAPPY BIRTHDAY ADDED -->
<div class="page page3" id="page3">
  <h2>Happy Birthday Lihini</h2> <!-- MEKA ADD KALA -->
  <div class="last-line" id="lastLine">
    that's all i had to say.<br><br>
    i'll close this now.
  </div>
  <div class="nav">
    <button onclick="nextPage(2)">← back</button>
    <button onclick="nextPage(1)">close</button>
  </div>
</div>

<script>
  const bgMusic = document.getElementById('bgMusic');
  const chime = document.getElementById('chime');

  bgMusic.volume = 0.15;
  chime.volume = 0.4;

  function startExperience() {
    bgMusic.play().catch(e => console.log("Audio blocked"));
    chime.play().catch(e => console.log("Audio blocked"));
    nextPage(2);
  }

  const message = `happy birthday, lihini.

i saw the date today and i just sat with it.

we're not together anymore. i stopped pretending that doesn't matter.

i don't know what your life looks like now. i hope it's quiet in a good way. 
i hope you found people who stay. i hope you don't have to explain yourself as much.

i'm not writing this to be remembered. or to start something. 
i just didn't want july 22nd to pass and me say nothing.

take care of yourself, lihini. for real.`;

  let typingDone = false;

  function nextPage(n) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page' + n).classList.add('active');
    
    if(n === 2 && !typingDone) {
      typeWriter();
    }
    if(n === 3) {
      setTimeout(() => {
        document.getElementById('lastLine').classList.add('show');
      }, 200);
    }
    if(n === 1) {
      bgMusic.pause();
      bgMusic.currentTime = 0;
    }
  }

  function typeWriter() {
    let i = 0;
    const speed = 32; 
    const el = document.getElementById('text');
    el.innerHTML = '';
    el.classList.add('cursor');
    typingDone = false;
    document.getElementById('nextBtn2').disabled = true;
    document.getElementById('sig').classList.remove('show');
    
    function typing() {
      if (i < message.length) {
        el.innerHTML += message.charAt(i);
        i++;
        setTimeout(typing, speed);
      } else {
        el.classList.remove('cursor');
        document.getElementById('sig').classList.add('show');
        document.getElementById('nextBtn2').disabled = false;
        typingDone = true;
      }
    }
    typing();
  }
</script>

</body>
</html>
