<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>happy birthday, lihini</title>

<style>
:root{
--bg:#0a0a0a;
--text:#e5e5e5;
--muted:#9d9d9d;
--accent:#f7d38b;
--line:#222;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:var(--bg);
color:var(--text);
font-family:
Inter,
system-ui,
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;
}

body{
position:relative;
}

.page{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:24px;
opacity:0;
visibility:hidden;
transition:opacity.8s ease;
}

.page.active{
opacity:1;
visibility:visible;
}

.hidden{
display:none;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

h1{
font-size:2rem;
font-weight:300;
letter-spacing:2px;
text-transform:lowercase;
margin-bottom:12px;
}

h2{
font-size:1rem;
font-weight:400;
color:var(--muted);
margin-bottom:20px;
}

p{
line-height:1.9;
font-size:1rem;
max-width:620px;
}

button{
margin-top:34px;
padding:14px 24px;
border:1px solid #444;
background:transparent;
color:var(--text);
font-size:.95rem;
border-radius:100px;
cursor:pointer;
transition:.35s;
text-transform:lowercase;
}

button:hover{
background:#171717;
transform:translateY(-2px);
}

button:active{
transform:scale(.97);
}

/* candle */
#candleWrap{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
user-select:none;
}

#openText{
margin-top:24px;
font-size:1rem;
letter-spacing:5px;
color:var(--muted);
text-transform:lowercase;
animation:pulse 2s infinite;
}

svg{
width:170px;
height:auto;
overflow:visible;
}

#wax{
fill:#ececec;
}

#wick{
stroke:#333;
stroke-width:3;
}

#flame{
opacity:0;
transform-origin:center;
animation:flicker.18s infinite alternate;
}

/* letter */
#letter{
max-width:700px;
white-space:pre-wrap;
line-height:2;
font-size:1rem;
text-transform:lowercase;
}

.cursor{
display:inline-block;
width:2px;
height:18px;
background:#fff;
margin-left:3px;
animation:blink.8s infinite;
vertical-align:middle;
}

/* gift card */
.card{
width:100%;
max-width:420px;
background:#111;
border:1px solid #252525;
border-radius:22px;
padding:28px;
position:relative;
backdrop-filter:blur(5px);
box-shadow:
0 0 40px rgba(255,255,255,.02);
z-index: 10;
}

.card p{
font-size:1rem;
line-height:2;
}

.signature{
margin-top:34px;
font-size:.82rem;
font-style:italic;
color:#888;
text-align:center;
}

/* floating */
#floating{
position:absolute;
inset:0;
overflow:hidden;
pointer-events:none;
z-index:0;
}

.float{
position:absolute;
bottom:-60px;
opacity:.75;
animation:rise linear infinite;
font-size:26px;
}

/* animations */
@keyframes flicker{
from{
transform:scale(.96) rotate(-2deg);
}
to{
transform:scale(1.04) rotate(2deg);
}
}

@keyframes pulse{
50%{
opacity:.45;
}
}

@keyframes blink{
50%{
opacity:0;
}
}

@keyframes rise{
from{
transform:translateY(0);
opacity:0;
}
15%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* mobile */
@media(min-width:768px){
h1{
font-size:3rem;
}
h2{
font-size:1.2rem;
}
#letter{
font-size:1.08rem;
}
.card{
padding:40px;
}
svg{
width:210px;
}
</style>
</head>

<body>

<div id="floating"></div>

<!-- page 1 -->
<section class="page active" id="page1">
<div id="candleWrap">
<svg viewBox="0 0 200 300">
<ellipse cx="100" cy="252" rx="36" ry="8" fill="#202020"/>
<rect id="wax" x="70" y="60" width="60" height="190" rx="10"/>
<line id="wick" x1="100" y1="60" x2="100" y2="42"/>
<g id="flame">
<path fill="#ffcf5c" d="M100 18 C85 40 90 54 100 62 110 54 115 40 100 18"/>
<path fill="#fff5d4" d="M100 28 C94 40 96 49 100 53 104 49 106 40 100 28"/>
</g>
</svg>
<div id="openText">open</div>
</div>
</section>

<!-- page 2 -->
<section class="page" id="page2">
<div id="letter"></div>
<button id="nextLetter" class="hidden">next →</button>
</section>

<!-- page 3 -->
<section class="page" id="page3">
<div class="center">
<h1>happy birthday, lihini</h1>
<h2>july 26th</h2>
<button id="giftBtn">one more thing →</button>
</div>
</section>

<!-- page 4 -->
<section class="page" id="page4">
<div class="card">
<p>
for you, lihini.

this is not a gift.

this is a reminder that you deserve soft things.

quiet mornings.

good books.

people who stay.
</p>
<div class="signature">i am your ex boyfriend dinu</div>
<button id="musicBtn">🤍 That's it</button>
</div>
</section>

<!-- audio -->
<audio id="bgMusic" loop preload="auto">
<source src="https://cdn.pixabay.com/audio/2022/03/24/audio_d1718f7208.mp3" type="audio/mpeg">
</audio>
<audio id="birthdaySong" loop preload="auto">
<source src="https://cdn.pixabay.com/audio/2025/04/21/audio_8b2b1c9b7a.mp3" type="audio/mpeg">
</audio>

<script>
// ==============================
// ALL JAVASCRIPT COMBINED
// ==============================

const pages = [
    document.getElementById("page1"),
    document.getElementById("page2"),
    document.getElementById("page3"),
    document.getElementById("page4")
];

const flame = document.getElementById("flame");
const candle = document.getElementById("candleWrap");
const bgMusic = document.getElementById("bgMusic");
const birthdaySong = document.getElementById("birthdaySong");
const letter = document.getElementById("letter");
const nextLetter = document.getElementById("nextLetter");
const giftBtn = document.getElementById("giftBtn");
const musicBtn = document.getElementById("musicBtn");
const floating = document.getElementById("floating");
const card = document.querySelector(".card");
const title = document.querySelector("#page3 h1");

const text = `hey lihini,

i didn't write this to ask for anything.

i just sat with it for a while and realized i never said this properly: thank you. for the parts that were good. for making me softer in places i didn't know were hard.

i hope this year gives you what you keep giving others without asking back. peace. space. people who stay.

take care of yourself, lihini. for real.`;

let typingFinished = false;

bgMusic.volume = 0.35;
birthdaySong.volume = 0.55;

function showPage(index){
    pages.forEach(page=>{
        page.classList.remove("active");
    });
    pages[index].classList.add("active");
}

function startLetter(){
    letter.innerHTML="";
    let i=0;
    const cursor=document.createElement("span");
    cursor.className="cursor";
    const timer=setInterval(()=>{
        if(i<text.length){
            letter.innerHTML=text.substring(0,i+1);
            letter.appendChild(cursor);
            i++;
        }else{
            clearInterval(timer);
            typingFinished=true;
            cursor.remove();
            nextLetter.classList.remove("hidden");
        }
    },35);
}

candle.addEventListener("click",()=>{
    flame.style.opacity="1";
    bgMusic.play().catch(()=>{});
    setTimeout(()=>{
        showPage(1);
        startLetter();
    },1000);
},{once:true});

nextLetter.addEventListener("click",()=>{
    showPage(2);
});

giftBtn.addEventListener("click",()=>{
    showPage(3);
});

musicBtn.addEventListener("click",()=>{
    bgMusic.pause();
    birthdaySong.currentTime=0;
    birthdaySong.play();
});

// floating objects
const icons=["🎈","❤️","🕯️","✨","🤍"];
function createFloating(){
    const item=document.createElement("div");
    item.className="float";
    item.innerHTML=icons[Math.floor(Math.random()*icons.length)];
    item.style.left=Math.random()*100+"vw";
    item.style.fontSize=(16+Math.random()*22)+"px";
    item.style.animationDuration=(7+Math.random()*8)+"s";
    item.style.filter="drop-shadow(0 0 8px rgba(255,255,255,.15))";
    floating.appendChild(item);
    setTimeout(()=>{
        item.remove();
    },16000);
}
setInterval(createFloating,350);

// candle flame extra flicker
setInterval(() => {
    if (flame.style.opacity === "1") {
        flame.style.transform = `scale(${0.96 + Math.random() * 0.12}) rotate(${Math.random()*6-3}deg)`;
    }
}, 120);

// breathing card animation
setInterval(()=>{
    if(card){
        card.animate([
            {transform:"scale(1)"},
            {transform:"scale(1.01)"},
            {transform:"scale(1)"}
        ],{
            duration:4000,
            iterations:1
        });
    }
},4200);

// title glow
if(title){
    setInterval(()=>{
        title.animate([
            {letterSpacing:"2px", opacity:0.85},
            {letterSpacing:"4px", opacity:1},
            {letterSpacing:"2px", opacity:0.85}
        ],{
            duration:2500
        });
    },2600);
}

// keyboard support
document.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
        if(pages[1].classList.contains("active") && typingFinished){
            showPage(2);
        }
    }
});

// auto pause when tab hidden
document.addEventListener("visibilitychange",()=>{
    if(document.hidden){
        bgMusic.pause();
        birthdaySong.pause();
    }else{
        if(flame.style.opacity==="1" && pages[3].classList.contains("active")){
            birthdaySong.play().catch(()=>{});
        }
    }
});

console.log(`
happy birthday, lihini
this page was made with respect,
for someone who was once an important part of my life.
— i am your ex boyfriend dinu
`);
</script>

</body>
</html>
